# Site
name: 'Historiamos Córdoba'
title: 'Historiamos Córdoba'
description: 'Visitas turísticas, rutas guiadas y experiencias culturales para descubrir Córdoba a través de su historia.'
logo: 'assets/images/logo.png'
favicon: 'assets/images/favicon.ico'
baseurl: ''
url: 'https://historiamoscordoba.github.io'
disqus: ''
email: 'antoniolopezjimenez30@gmail.com'
mailchimp-list: ''

include: ["_pages"]
permalink: /:title/

# Plugins
plugins: 
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-seo-tag
  
authors:
    antonio:
      name:           Antonio López Jiménez
      site:           https://historiamoscordoba.github.io
      avatar:         /assets/images/avatar1.jpg
      bio:            "Hola, soy Antonio López Jiménez, historiador. Me apasiona la historia y la educación, y me encanta compartir Córdoba a través de sus monumentos, calles y relatos."
      email:          antoniolopezjimenez30@gmail.com
      twitter:        

# Defaults
defaults:

  # all posts
  - scope:
      path: "_posts"
    values:
      layout: post
      author: antonio
      avatar: /assets/images/avatar1.jpg
      
  # all pages
  - scope:
      path: "_pages"
    values:
      layout: page
      
# Syntax
markdown: kramdown
highlighter: rouge

# Paginate
paginate: 10

# Exclude metadata and development time dependencies
exclude:
  - README.markdown
  - package.json
  - grunt.js
  - Gruntfile.js
  - Gruntfile.coffee
  - node_modules