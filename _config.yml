# Site
name: 'Historiamos Córdoba'
description: 'Visitas turísticas, rutas guiadas e historias de Córdoba para descubrir la ciudad con una mirada histórica y cercana.'
logo: 'assets/images/logo.png'
favicon: 'assets/images/favicon.ico'
baseurl: ''
url: 'https://historiamoscordoba.github.io'
disqus: ''
email: 'antoniolopezjimenez30@gmail.com'
mailchimp-list: ''

include: ["_pages"]
permalink: /:title/

# Plugins
plugins: 
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-seo-tag
  
authors:
    antonio:
      name:           Antonio López Jiménez
      site:           https://historiamoscordoba.github.io
      avatar:         /assets/images/avatar1.jpg
      bio:            "Historiador y divulgador. En Historiamos Córdoba comparto rutas, visitas y relatos para descubrir Córdoba desde su historia, su patrimonio y sus rincones menos conocidos."
      email:          antoniolopezjimenez30@gmail.com
      twitter:        

# Defaults
defaults:

  # all posts
  - scope:
      path: "_posts"
    values:
      layout: post
      author: antonio
      avatar: /assets/images/avatar1.jpg
      
  # all pages
  - scope:
      path: "_pages"
    values:
      layout: page
      
# Syntax
markdown: kramdown
highlighter: rouge

# Paginate
paginate: 10

exclude:
  - README.markdown
  - README.md
  - package.json
  - grunt.js
  - Gruntfile.js
  - Gruntfile.coffee
  - node_modules
